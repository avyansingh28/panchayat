<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PANCHAYAT - Community Registration</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Poppins', sans-serif;
            overflow-x: hidden;
        }
        
        .app-container {
            min-height: 100vh;
            background: linear-gradient(135deg, #0f766e 0%, #065f46 50%, #064e3b 100%);
            position: relative;
            overflow: hidden;
            padding: 2rem;
        }
        
        .app-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 1;
            background: 
                radial-gradient(circle at 20% 80%, rgba(251, 191, 36, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(16, 185, 129, 0.15) 0%, transparent 50%);
            pointer-events: none;
            animation: backgroundPulse 8s ease-in-out infinite;
        }
        
        @keyframes backgroundPulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
        
        .floating-leaves {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
            overflow: hidden;
        }
        
        .leaf {
            position: absolute;
            width: 20px;
            height: 20px;
            background: rgba(251, 191, 36, 0.3);
            border-radius: 0 100% 0 100%;
            animation: float 15s infinite ease-in-out;
        }
        
        .leaf:nth-child(1) { left: 10%; animation-delay: 0s; }
        .leaf:nth-child(2) { left: 30%; animation-delay: 3s; }
        .leaf:nth-child(3) { left: 50%; animation-delay: 6s; }
        .leaf:nth-child(4) { left: 70%; animation-delay: 9s; }
        .leaf:nth-child(5) { left: 90%; animation-delay: 12s; }
        
        @keyframes float {
            0% {
                transform: translateY(-100px) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(100vh) rotate(360deg);
                opacity: 0;
            }
        }
        
        .main-content {
            max-width: 900px;
            margin: 0 auto;
            position: relative;
            z-index: 2;
        }

        .header-tree-img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            object-position: center bottom;
            border-radius: 50%;
            display: block;
            opacity: 1;
        }
        
        .header {
            text-align: center;
            margin-bottom: 3rem;
            animation: slideDown 0.8s ease-out;
        }
        
        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .tree-container {
            width: 120px;
            height: 120px;
            margin: 0 auto 1.5rem;
            background: linear-gradient(135deg, #0f766e 0%, #065f46 50%, #064e3b 100%);
            overflow: hidden;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 3px solid rgba(251, 191, 36, 0.45);
            animation: treeGlow 3s ease-in-out infinite;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            isolation: isolate;
        }
        
        @keyframes treeGlow {
            0%, 100% {
                box-shadow: 0 10px 40px rgba(251, 191, 36, 0.3);
                transform: scale(1);
            }
            50% {
                box-shadow: 0 10px 60px rgba(251, 191, 36, 0.5);
                transform: scale(1.05);
            }
        }
        
        .main-title {
            font-family: 'Playfair Display', serif;
            font-size: 4rem;
            font-weight: 800;
            color: #fbbf24;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
            margin-bottom: 0.5rem;
            letter-spacing: 2px;
        }
        
        .subtitle {
            font-size: 1.25rem;
            color: rgba(255, 255, 255, 0.9);
            font-weight: 300;
            letter-spacing: 1px;
        }
        
        .form-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 3rem;
            box-shadow: 0 20px 80px rgba(0, 0, 0, 0.3);
            animation: slideUp 1s ease-out 0.2s backwards;
            border: 1px solid rgba(251, 191, 36, 0.2);
        }
        
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .form-title {
            font-size: 1.75rem;
            font-weight: 600;
            color: #065f46;
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }
        
        .form-grid {
            display: grid;
            gap: 1.5rem;
        }
        
        .form-group {
            position: relative;
        }
        
        .input-label {
            display: block;
            font-size: 0.875rem;
            font-weight: 500;
            color: #065f46;
            margin-bottom: 0.5rem;
        }
        
        .input-wrapper {
            position: relative;
        }
        
        .form-input {
            width: 100%;
            padding: 1rem 1rem 1rem 3rem;
            border: 2px solid #d1d5db;
            border-radius: 15px;
            font-size: 1rem;
            font-family: 'Poppins', sans-serif;
            transition: all 0.3s ease;
            background: white;
        }
        
        .form-input:focus {
            outline: none;
            border-color: #fbbf24;
            box-shadow: 0 0 0 4px rgba(251, 191, 36, 0.1);
            transform: translateY(-2px);
        }
        
        .form-input.error {
            border-color: #ef4444;
        }
        
        .input-icon {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: #065f46;
            opacity: 0.6;
            pointer-events: none;
            transition: all 0.3s ease;
            font-size: 1.25rem;
        }
        
        .form-input:focus ~ .input-icon {
            color: #fbbf24;
            opacity: 1;
            transform: translateY(-50%) scale(1.1);
        }
        
        .error-message {
            color: #ef4444;
            font-size: 0.875rem;
            margin-top: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.25rem;
            animation: shake 0.3s ease;
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        
        .submit-button {
            width: 100%;
            padding: 1.25rem;
            background: linear-gradient(135deg, #fbbf24 0%, #f59e0b 100%);
            color: #065f46;
            border: none;
            border-radius: 15px;
            font-size: 1.125rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            box-shadow: 0 10px 30px rgba(251, 191, 36, 0.3);
        }
        
        .submit-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(251, 191, 36, 0.4);
        }
        
        .submit-button:active {
            transform: translateY(-1px);
        }
        
        .success-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(6, 95, 70, 0.95);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            animation: fadeIn 0.3s ease;
        }
        
        .success-overlay.active {
            display: flex;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        .success-content {
            text-align: center;
            animation: successPop 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }
        
        @keyframes successPop {
            from {
                opacity: 0;
                transform: scale(0.5);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }
        
        .success-icon {
            width: 100px;
            height: 100px;
            background: #fbbf24;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            animation: pulse 1s ease infinite;
            font-size: 3.5rem;
        }
        
        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
                box-shadow: 0 0 0 0 rgba(251, 191, 36, 0.7);
            }
            50% {
                transform: scale(1.1);
                box-shadow: 0 0 0 20px rgba(251, 191, 36, 0);
            }
        }
        
        .success-title {
            font-size: 2.5rem;
            font-weight: 700;
            color: #fbbf24;
            margin-bottom: 0.5rem;
        }
        
        .success-message {
            font-size: 1.25rem;
            color: rgba(255, 255, 255, 0.9);
        }
        
        .stats-container {
            margin-top: 2rem;
            padding: 1.5rem;
            background: rgba(251, 191, 36, 0.1);
            border-radius: 15px;
            border: 1px solid rgba(251, 191, 36, 0.3);
        }
        
        .stats-title {
            font-size: 1rem;
            font-weight: 600;
            color: #065f46;
            margin-bottom: 0.75rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .stats-number {
            font-size: 2rem;
            font-weight: 700;
            color: #fbbf24;
            text-align: center;
        }
        
        .hidden {
            display: none;
        }
        
        /* Tree branches decoration */
        .branch-decoration {
            position: absolute;
            top: 20%;
            width: 100%;
            height: 100%;
            pointer-events: none;
            opacity: 0.08;
            z-index: 1;
        }
        
        .branch {
            position: absolute;
            width: 200px;
            height: 3px;
            background: linear-gradient(90deg, rgba(120, 53, 15, 0.6), transparent);
            transform-origin: left center;
        }
        
        .branch:nth-child(1) {
            top: 10%;
            left: 0;
            animation: branchGrow 4s ease-out infinite;
        }
        
        .branch:nth-child(2) {
            top: 25%;
            right: 0;
            transform: scaleX(-1);
            animation: branchGrow 4s ease-out 1s infinite;
        }
        
        .branch:nth-child(3) {
            top: 40%;
            left: 0;
            animation: branchGrow 4s ease-out 2s infinite;
        }
        
        @keyframes branchGrow {
            0%, 100% {
                transform: scaleX(0.8) rotate(-5deg);
            }
            50% {
                transform: scaleX(1) rotate(0deg);
            }
        }
        
        @media (max-width: 640px) {
            .app-container {
                padding: 1rem;
            }
            
            .main-title {
                font-size: 2.5rem;
            }
            
            .form-card {
                padding: 2rem 1.5rem;
            }
        }
        
    </style>
</head>
<body>
    <div class="app-container">
        <div class="floating-leaves">
            <div class="leaf"></div>
            <div class="leaf"></div>
            <div class="leaf"></div>
            <div class="leaf"></div>
            <div class="leaf"></div>
        </div>
        
        <!-- Branch decorations -->
        <div class="branch-decoration">
            <div class="branch"></div>
            <div class="branch"></div>
            <div class="branch"></div>
        </div>

        <div class="main-content" id="memberSection">
            <div class="header">
                <div class="tree-container">
                    <img
                        class="header-tree-img"
                        src="mango-tree-illustration.png"
                        alt="Mango tree"
                        width="240"
                        height="240"
                    />
                </div>
                <h1 class="main-title">PANCHAYAT</h1>
                <p class="subtitle">Mahendra Aarya Community</p>
            </div>

            <div class="form-card">
                <h2 class="form-title">
                    <span>👤</span>
                    Register New Member
                </h2>

                <form id="registrationForm" class="form-grid">
                    <div class="form-group">
                        <label class="input-label">Member Name *</label>
                        <div class="input-wrapper">
                            <input
                                type="text"
                                id="memberName"
                                name="memberName"
                                class="form-input"
                                placeholder="Enter full name"
                            />
                            <span class="input-icon">👤</span>
                        </div>
                        <p class="error-message hidden" id="error-memberName"></p>
                    </div>

                    <div class="form-group">
                        <label class="input-label">Phone Number *</label>
                        <div class="input-wrapper">
                            <input
                                type="tel"
                                id="phoneNumber"
                                name="phoneNumber"
                                class="form-input"
                                placeholder="10-digit mobile number"
                            />
                            <span class="input-icon">📞</span>
                        </div>
                        <p class="error-message hidden" id="error-phoneNumber"></p>
                    </div>

                    <div class="form-group">
                        <label class="input-label">Flat Number *</label>
                        <div class="input-wrapper">
                            <input
                                type="text"
                                id="flatNo"
                                name="flatNo"
                                class="form-input"
                                placeholder="e.g., A-101"
                            />
                            <span class="input-icon">🏠</span>
                        </div>
                        <p class="error-message hidden" id="error-flatNo"></p>
                    </div>

                    <div class="form-group">
                        <label class="input-label">Date of Birth *</label>
                        <div class="input-wrapper">
                            <input
                                type="date"
                                id="dob"
                                name="dob"
                                class="form-input"
                            />
                            <span class="input-icon">📅</span>
                        </div>
                        <p class="error-message hidden" id="error-dob"></p>
                    </div>

                    <div class="form-group">
                        <label class="input-label">Anniversary Date</label>
                        <div class="input-wrapper">
                            <input
                                type="date"
                                id="anniversary"
                                name="anniversary"
                                class="form-input"
                            />
                            <span class="input-icon">❤️</span>
                        </div>
                    </div>

                    <button type="submit" class="submit-button">
                        <span>➕</span>
                        Register Member
                    </button>
                </form>

                <div class="stats-container" id="statsContainer">
                    <p class="stats-title">
                        <span>👥</span>
                        Total Members Registered
                    </p>
                    <p class="stats-number" id="memberCount">0</p>
                </div>
            </div>
        </div>

        <div class="success-overlay" id="successOverlay">
            <div class="success-content">
                <div class="success-icon">✓</div>
                <h2 class="success-title">Welcome to PANCHAYAT!</h2>
                <p class="success-message">Member registered successfully</p>
            </div>
        </div>
    </div>

    <script>
        // Load members from localStorage
        let members = JSON.parse(localStorage.getItem('panchayat-members') || '[]');

        document.getElementById('memberCount').textContent = members.length;

        // Form submission handler
        document.getElementById('registrationForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            // Clear previous errors
            document.querySelectorAll('.error-message').forEach(el => {
                el.classList.add('hidden');
                el.textContent = '';
            });
            document.querySelectorAll('.form-input').forEach(el => {
                el.classList.remove('error');
            });
            
            // Get form data
            const formData = {
                memberName: document.getElementById('memberName').value,
                phoneNumber: document.getElementById('phoneNumber').value,
                flatNo: document.getElementById('flatNo').value,
                dob: document.getElementById('dob').value,
                anniversary: document.getElementById('anniversary').value
            };
            
            // Validate form
            let isValid = true;
            
            if (!formData.memberName.trim()) {
                showError('memberName', 'Name is required');
                isValid = false;
            }
            
            if (!formData.phoneNumber.trim()) {
                showError('phoneNumber', 'Phone number is required');
                isValid = false;
            } else if (!/^\d{10}$/.test(formData.phoneNumber.replace(/\s/g, ''))) {
                showError('phoneNumber', 'Please enter a valid 10-digit phone number');
                isValid = false;
            }
            
            if (!formData.flatNo.trim()) {
                showError('flatNo', 'Flat number is required');
                isValid = false;
            }
            
            if (!formData.dob) {
                showError('dob', 'Date of birth is required');
                isValid = false;
            }
            
            if (isValid) {
                // Add new member
                const newMember = {
                    id: Date.now(),
                    ...formData,
                    registeredDate: new Date().toISOString()
                };
                
                members.push(newMember);
                localStorage.setItem('panchayat-members', JSON.stringify(members));
                
                // Update count
                document.getElementById('memberCount').textContent = members.length;
                
                // Show success overlay
                document.getElementById('successOverlay').classList.add('active');
                
                // Hide success overlay and reset form after 3 seconds
                setTimeout(() => {
                    document.getElementById('successOverlay').classList.remove('active');
                    document.getElementById('registrationForm').reset();
                }, 3000);
            }
        });
        
        function showError(fieldName, message) {
            const errorElement = document.getElementById('error-' + fieldName);
            const inputElement = document.getElementById(fieldName);
            
            errorElement.textContent = '⚠️ ' + message;
            errorElement.classList.remove('hidden');
            inputElement.classList.add('error');
        }
    </script>
</body>
</html>
